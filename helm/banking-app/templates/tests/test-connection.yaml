apiVersion: v1
kind: Pod

metadata:
  name: "{{ include "banking-app.fullname" . }}-test"

  labels:
    {{- include "banking-app.labels" . | nindent 4 }}

  annotations:
    "helm.sh/hook": test

spec:
  restartPolicy: Never

  containers:
    - name: wget
      image: busybox:1.36

      command:
        - wget

      args:
        - "http://{{ include "banking-app.fullname" . }}:{{ .Values.service.port }}/health/"