name: Django Banking AWS EKS CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: securebank_prod_images
  EKS_CLUSTER_NAME: demo-eks-cluster

  PYTHON_VERSION: "3.12"

  HELM_RELEASE: banking
  HELM_CHART_PATH: ./helm/banking-app
  KUBERNETES_NAMESPACE: banking

jobs:

  # =========================================================
  # Job 1: Test Django application
  # =========================================================
  test:
    name: Test Django Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check for missing migrations
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Apply database migrations
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py migrate --noinput

      - name: Run Django system checks
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py check

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py test --verbosity=2

      - name: Validate static-file collection
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py collectstatic --noinput

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: |
          helm lint "${HELM_CHART_PATH}"

      - name: Render Helm templates
        run: |
          helm template \
            "${HELM_RELEASE}" \
            "${HELM_CHART_PATH}" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --set-string "image.repository=test/django-banking-app" \
            --set-string "image.tag=test" \
            --set-string "django.secretKey=test-only-secret"

  # =========================================================
  # Job 2: Build Docker image and push to Amazon ECR
  # =========================================================
  build-and-push:
    name: Build and Push Image to ECR
    runs-on: ubuntu-latest

    needs:
      - test

    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity

      - name: Create ECR repository if it does not exist
        shell: bash
        run: |
          if aws ecr describe-repositories \
            --repository-names "${ECR_REPOSITORY}" \
            --region "${AWS_REGION}" >/dev/null 2>&1; then

            echo "ECR repository already exists: ${ECR_REPOSITORY}"

          else
            echo "Creating ECR repository: ${ECR_REPOSITORY}"

            aws ecr create-repository \
              --repository-name "${ECR_REPOSITORY}" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE \
              --region "${AWS_REGION}"
          fi

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate and validate ECR image details
        id: image
        shell: bash
        run: |
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity \
            --query Account \
            --output text)"

          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_REPOSITORY="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_URI="${IMAGE_REPOSITORY}:${IMAGE_TAG}"

          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            echo "ERROR: AWS account ID is empty."
            exit 1
          fi

          if [ -z "${IMAGE_REPOSITORY}" ]; then
            echo "ERROR: ECR image repository is empty."
            exit 1
          fi

          if [ -z "${IMAGE_TAG}" ]; then
            echo "ERROR: Docker image tag is empty."
            exit 1
          fi

          echo "IMAGE_REPOSITORY=${IMAGE_REPOSITORY}" >> "${GITHUB_ENV}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "${GITHUB_ENV}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

          echo "AWS account: ${AWS_ACCOUNT_ID}"
          echo "Image repository: ${IMAGE_REPOSITORY}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "Complete image URI: ${IMAGE_URI}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_URI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image exists in ECR
        shell: bash
        run: |
          aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids "imageTag=${GITHUB_SHA}" \
            --region "${AWS_REGION}"

          echo "Docker image successfully pushed:"
          echo "${IMAGE_URI}"

  # =========================================================
  # Job 3: Deploy ECR image to Amazon EKS using Helm
  # =========================================================
  deploy-to-eks:
    name: Deploy Application to EKS
    runs-on: ubuntu-latest

    needs:
      - test
      - build-and-push

    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request'

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}"

      - name: Verify EKS connectivity
        run: |
          kubectl config current-context
          kubectl get nodes
          kubectl cluster-info

      # Build the ECR URI again instead of passing it from another job.
      - name: Generate deployment image details
        shell: bash
        run: |
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity \
            --query Account \
            --output text)"

          DEPLOY_IMAGE_REPOSITORY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          DEPLOY_IMAGE_TAG="${GITHUB_SHA}"
          DEPLOY_IMAGE_URI="${DEPLOY_IMAGE_REPOSITORY}:${DEPLOY_IMAGE_TAG}"

          if [ -z "${AWS_ACCOUNT_ID}" ]; then
            echo "ERROR: AWS account ID is empty."
            exit 1
          fi

          if [ -z "${DEPLOY_IMAGE_REPOSITORY}" ]; then
            echo "ERROR: Deployment image repository is empty."
            exit 1
          fi

          if [ -z "${DEPLOY_IMAGE_TAG}" ]; then
            echo "ERROR: Deployment image tag is empty."
            exit 1
          fi

          echo "DEPLOY_IMAGE_REPOSITORY=${DEPLOY_IMAGE_REPOSITORY}" >> "${GITHUB_ENV}"
          echo "DEPLOY_IMAGE_TAG=${DEPLOY_IMAGE_TAG}" >> "${GITHUB_ENV}"
          echo "DEPLOY_IMAGE_URI=${DEPLOY_IMAGE_URI}" >> "${GITHUB_ENV}"

          echo "EKS cluster: ${EKS_CLUSTER_NAME}"
          echo "AWS region: ${AWS_REGION}"
          echo "Namespace: ${KUBERNETES_NAMESPACE}"
          echo "Helm release: ${HELM_RELEASE}"
          echo "Deployment image: ${DEPLOY_IMAGE_URI}"

      - name: Verify deployment image exists in ECR
        run: |
          aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids "imageTag=${DEPLOY_IMAGE_TAG}" \
            --region "${AWS_REGION}"

          echo "Confirmed image exists: ${DEPLOY_IMAGE_URI}"

      - name: Validate Helm chart
        run: |
          helm lint "${HELM_CHART_PATH}"

      - name: Render Helm chart with deployment image
        run: |
          helm template \
            "${HELM_RELEASE}" \
            "${HELM_CHART_PATH}" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --set-string "image.repository=${DEPLOY_IMAGE_REPOSITORY}" \
            --set-string "image.tag=${DEPLOY_IMAGE_TAG}" \
            --set-string "image.pullPolicy=IfNotPresent" \
            --set-string "django.secretKey=test-render-secret" \
            --set-string "django.debug=False" \
            --set-string "django.allowedHosts=*"

      - name: Create Kubernetes namespace
        run: |
          kubectl create namespace "${KUBERNETES_NAMESPACE}" \
            --dry-run=client \
            -o yaml |
          kubectl apply -f -

      - name: Deploy Django application to EKS
        env:
          DEPLOY_DJANGO_SECRET: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          echo "Deploying image: ${DEPLOY_IMAGE_URI}"

          helm upgrade \
            --install \
            "${HELM_RELEASE}" \
            "${HELM_CHART_PATH}" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --create-namespace \
            --set-string "image.repository=${DEPLOY_IMAGE_REPOSITORY}" \
            --set-string "image.tag=${DEPLOY_IMAGE_TAG}" \
            --set-string "image.pullPolicy=IfNotPresent" \
            --set-string "secret.djangoSecretKey=${DEPLOY_DJANGO_SECRET}" \
            --set-string "config.debug=False" \
            --set-string "config.allowedHosts=*" \
            --wait \
            --timeout 10m \
            --rollback-on-failure

      - name: Verify deployment image
        run: |
          DEPLOYED_IMAGE="$(kubectl get deployment \
            "${HELM_RELEASE}-banking-app" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --output jsonpath='{.spec.template.spec.containers[0].image}')"

          echo "Expected image: ${DEPLOY_IMAGE_URI}"
          echo "Deployed image: ${DEPLOYED_IMAGE}"

          if [ "${DEPLOYED_IMAGE}" != "${DEPLOY_IMAGE_URI}" ]; then
            echo "ERROR: Kubernetes deployment is using an unexpected image."
            exit 1
          fi

      - name: Verify deployment rollout
        run: |
          kubectl rollout status \
            "deployment/${HELM_RELEASE}-banking-app" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --timeout=600s

      - name: Display Kubernetes resources
        run: |
          echo "===== Helm Release ====="
          helm status "${HELM_RELEASE}" \
            --namespace "${KUBERNETES_NAMESPACE}"

          echo "===== Nodes ====="
          kubectl get nodes -o wide

          echo "===== Deployments ====="
          kubectl get deployments \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide

          echo "===== Pods ====="
          kubectl get pods \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide

          echo "===== Services ====="
          kubectl get services \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide

          echo "===== Ingress ====="
          kubectl get ingress \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide || true

      - name: Show diagnostic information after failure
        if: failure()
        run: |
          echo "===== Helm Releases ====="
          helm list \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --all || true

          echo "===== Helm Status ====="
          helm status "${HELM_RELEASE}" \
            --namespace "${KUBERNETES_NAMESPACE}" || true

          echo "===== Deployments ====="
          kubectl get deployments \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide || true

          echo "===== Pods ====="
          kubectl get pods \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide || true

          echo "===== Pod Descriptions ====="
          for pod in $(kubectl get pods \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --output name 2>/dev/null); do
            kubectl describe "${pod}" \
              --namespace "${KUBERNETES_NAMESPACE}" || true
          done

          echo "===== Deployment Description ====="
          kubectl describe deployment \
            "${HELM_RELEASE}-banking-app" \
            --namespace "${KUBERNETES_NAMESPACE}" || true

          echo "===== Services ====="
          kubectl get services \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide || true

          echo "===== Events ====="
          kubectl get events \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --sort-by='.metadata.creationTimestamp' || true

          echo "===== Application Logs ====="
          kubectl logs \
            "deployment/${HELM_RELEASE}-banking-app" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --all-containers=true \
            --tail=200 || true