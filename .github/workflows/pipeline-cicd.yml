name: Django Banking CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: django-banking-app
  HELM_RELEASE: banking
  HELM_CHART_PATH: ./helm/banking-app
  KUBERNETES_NAMESPACE: banking

jobs:
  # =========================================================
  # Job 1: Checkout, install dependencies and test Django
  # =========================================================
  test:
    name: Checkout and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check for missing migrations
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Apply database migrations
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py migrate --noinput

      - name: Run Django system checks
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py check

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py test --verbosity=2

      - name: Validate static-file collection
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py collectstatic --noinput

      - name: Lint Helm chart
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Run Helm lint
        run: |
          helm lint "${HELM_CHART_PATH}"

      - name: Render Helm templates
        run: |
          helm template "${HELM_RELEASE}" "${HELM_CHART_PATH}" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --set image.repository=test/django-banking-app \
            --set image.tag=test \
            --set-string django.secretKey=test-only-secret


  # =========================================================
  # Job 2: Build multi-stage Docker image and push to Docker Hub
  # =========================================================
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - test

    if: github.event_name != 'pull_request'

    outputs:
      image_repository: ${{ steps.image.outputs.repository }}
      image_tag: ${{ steps.image.outputs.tag }}
      image_full_name: ${{ steps.image.outputs.full_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert Docker Hub username to lowercase
        id: dockerhub
        shell: bash
        run: |
          USERNAME=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          echo "username=${USERNAME}" >> "${GITHUB_OUTPUT}"

      - name: Generate immutable image name
        id: image
        shell: bash
        run: |
          IMAGE_REPOSITORY="${{ steps.dockerhub.outputs.username }}/${IMAGE_NAME}"
          IMAGE_TAG="${GITHUB_SHA}"

          echo "repository=${IMAGE_REPOSITORY}" >> "${GITHUB_OUTPUT}"
          echo "tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "full_name=${IMAGE_REPOSITORY}:${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true

          tags: |
            ${{ steps.image.outputs.full_name }}
            ${{ steps.image.outputs.repository }}:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Display published image
        run: |
          echo "Published image:"
          echo "${{ steps.image.outputs.full_name }}"

  # =========================================================
  # Job 3: Deploy to local Docker Desktop Kubernetes
  # =========================================================
  deploy:
    name: Deploy to Docker Desktop Kubernetes

    runs-on:
      - self-hosted
      - Windows
      - X64
      - docker-desktop

    needs:
      - build

    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request'

    environment:
      name: local-docker-desktop
      url: http://localhost:30080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Display deployment information
        shell: powershell
        run: |
          Write-Host "Image repository: ${{ needs.build.outputs.image_repository }}"
          Write-Host "Image tag: ${{ needs.build.outputs.image_tag }}"
          Write-Host "Full image: ${{ needs.build.outputs.image_full_name }}"
          Write-Host "Namespace: $env:KUBERNETES_NAMESPACE"
          Write-Host "Helm release: $env:HELM_RELEASE"

      - name: Verify required tools
        shell: powershell
        run: |
          docker version
          kubectl version --client
          helm version

      - name: Select Docker Desktop Kubernetes context
        shell: powershell
        run: |
          kubectl config use-context docker-desktop
          kubectl config current-context
          kubectl cluster-info
          kubectl get nodes

      - name: Create namespace if missing
        shell: powershell
        run: |
          kubectl get namespace $env:KUBERNETES_NAMESPACE 2>$null

          if ($LASTEXITCODE -ne 0) {
            kubectl create namespace $env:KUBERNETES_NAMESPACE
          }

      - name: Set current namespace
        shell: powershell
        run: |
          kubectl config set-context --current `
            --namespace=$env:KUBERNETES_NAMESPACE

      - name: Lint Helm chart
        shell: powershell
        run: |
          helm lint $env:HELM_CHART_PATH

      - name: Render Helm templates
        shell: powershell
        run: |
          helm template $env:HELM_RELEASE $env:HELM_CHART_PATH `
            --namespace $env:KUBERNETES_NAMESPACE `
            --set image.repository="${{ needs.build.outputs.image_repository }}" `
            --set image.tag="${{ needs.build.outputs.image_tag }}" `
            --set image.pullPolicy="Always" `
            --set-string django.secretKey="${{ secrets.DJANGO_SECRET_KEY }}" `
            --set-string django.allowedHosts="localhost,127.0.0.1,*" `
            --debug | Out-Null

      - name: Deploy with Helm
        shell: powershell
        run: |
          helm upgrade --install $env:HELM_RELEASE $env:HELM_CHART_PATH `
            --namespace $env:KUBERNETES_NAMESPACE `
            --create-namespace `
            --set image.repository="${{ needs.build.outputs.image_repository }}" `
            --set image.tag="${{ needs.build.outputs.image_tag }}" `
            --set image.pullPolicy="Always" `
            --set-string django.secretKey="${{ secrets.DJANGO_SECRET_KEY }}" `
            --set-string django.allowedHosts="localhost,127.0.0.1,*" `
            --wait `
            --atomic `
            --timeout 5m

      - name: Verify deployment
        shell: powershell
        run: |
          helm status $env:HELM_RELEASE `
            --namespace $env:KUBERNETES_NAMESPACE

          kubectl get deployments `
            --namespace $env:KUBERNETES_NAMESPACE

          kubectl get pods `
            --namespace $env:KUBERNETES_NAMESPACE `
            -o wide

          kubectl get services `
            --namespace $env:KUBERNETES_NAMESPACE

          kubectl get endpointslices `
            --namespace $env:KUBERNETES_NAMESPACE

      - name: Wait for Django rollout
        shell: powershell
        run: |
          kubectl rollout status `
            deployment/banking-banking-app `
            --namespace $env:KUBERNETES_NAMESPACE `
            --timeout=180s

      - name: Test application through NodePort
        shell: powershell
        run: |
          Start-Sleep -Seconds 10

          $url = "http://localhost:30080"
          Write-Host "Testing $url"

          $response = Invoke-WebRequest `
            -Uri $url `
            -UseBasicParsing `
            -TimeoutSec 30

          Write-Host "HTTP status: $($response.StatusCode)"

          if ($response.StatusCode -ne 200) {
            throw "Application health verification failed."
          }

      - name: Show diagnostics on failure
        if: failure()
        shell: powershell
        run: |
          Write-Host "===== Helm status ====="
          helm status $env:HELM_RELEASE `
            --namespace $env:KUBERNETES_NAMESPACE 2>$null

          Write-Host "===== Kubernetes resources ====="
          kubectl get all `
            --namespace $env:KUBERNETES_NAMESPACE `
            -o wide

          Write-Host "===== Pod descriptions ====="
          kubectl describe pods `
            --namespace $env:KUBERNETES_NAMESPACE

          Write-Host "===== Application logs ====="
          kubectl logs `
            --namespace $env:KUBERNETES_NAMESPACE `
            deployment/banking-banking-app `
            --all-containers=true `
            --tail=200