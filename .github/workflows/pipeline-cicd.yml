name: Django Banking AWS EKS CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: django-banking-app
  EKS_CLUSTER_NAME: demo-eks-cluster

  PYTHON_VERSION: "3.12"

  HELM_RELEASE: banking
  HELM_CHART_PATH: ./helm/banking-app
  KUBERNETES_NAMESPACE: banking

jobs:

  # =========================================================
  # Job 1: Test Django application
  # =========================================================
  test:
    name: Test Django Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check for missing migrations
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Apply database migrations
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py migrate --noinput

      - name: Run Django system checks
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py check

      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py test --verbosity=2

      - name: Validate static-file collection
        env:
          DJANGO_SECRET_KEY: test-only-secret-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: |
          python manage.py collectstatic --noinput

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: |
          helm lint "${HELM_CHART_PATH}"

      - name: Render Helm templates
        run: |
          helm template "${HELM_RELEASE}" "${HELM_CHART_PATH}" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --set image.repository=test/django-banking-app \
            --set image.tag=test \
            --set-string django.secretKey=test-only-secret


  # =========================================================
  # Job 2: Build Docker image and push to Amazon ECR
  # =========================================================
  build-and-push:
    name: Build and Push Image to ECR
    runs-on: ubuntu-latest
    needs:
      - test

    if: github.event_name != 'pull_request'

    outputs:
      image_repository: ${{ steps.image.outputs.repository }}
      image_tag: ${{ steps.image.outputs.tag }}
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Recommended authentication method:
      # GitHub OIDC assumes an AWS IAM role.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity

      - name: Create ECR repository if it does not exist
        shell: bash
        run: |
          if aws ecr describe-repositories \
            --repository-names "${ECR_REPOSITORY}" \
            --region "${AWS_REGION}" >/dev/null 2>&1; then

            echo "ECR repository already exists: ${ECR_REPOSITORY}"

          else
            echo "Creating ECR repository: ${ECR_REPOSITORY}"

            aws ecr create-repository \
              --repository-name "${ECR_REPOSITORY}" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability IMMUTABLE \
              --region "${AWS_REGION}"
          fi

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate ECR image details
        id: image
        shell: bash
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_REPOSITORY="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          IMAGE_URI="${IMAGE_REPOSITORY}:${IMAGE_TAG}"

          echo "repository=${IMAGE_REPOSITORY}" >> "${GITHUB_OUTPUT}"
          echo "tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

          echo "Image repository: ${IMAGE_REPOSITORY}"
          echo "Image tag: ${IMAGE_TAG}"
          echo "Complete image URI: ${IMAGE_URI}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true

          tags: |
            ${{ steps.image.outputs.image_uri }}
            ${{ steps.image.outputs.repository }}:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Display published ECR image
        run: |
          echo "Docker image pushed successfully:"
          echo "${{ steps.image.outputs.image_uri }}"


  # =========================================================
  # Job 3: Deploy ECR image to Amazon EKS using Helm
  # =========================================================
  deploy-to-eks:
    name: Deploy Application to EKS
    runs-on: ubuntu-latest

    needs:
      - test
      - build-and-push

    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request'

    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER_NAME}"

      - name: Verify EKS connectivity
        run: |
          kubectl config current-context
          kubectl get nodes
          kubectl cluster-info

      - name: Display deployment information
        run: |
          echo "EKS cluster: ${EKS_CLUSTER_NAME}"
          echo "AWS region: ${AWS_REGION}"
          echo "Namespace: ${KUBERNETES_NAMESPACE}"
          echo "Helm release: ${HELM_RELEASE}"
          echo "Image repository: ${{ needs.build-and-push.outputs.image_repository }}"
          echo "Image tag: ${{ needs.build-and-push.outputs.image_tag }}"

      - name: Validate Helm chart
        run: |
          helm lint "${HELM_CHART_PATH}"

      - name: Create Kubernetes namespace
        run: |
          kubectl create namespace "${KUBERNETES_NAMESPACE}" \
            --dry-run=client \
            -o yaml |
          kubectl apply -f -

      - name: Deploy Django application to EKS
        env:
          DEPLOY_IMAGE_REPOSITORY: ${{ needs.build-and-push.outputs.image_repository }}
          DEPLOY_IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          DEPLOY_DJANGO_SECRET: ${{ secrets.DJANGO_SECRET_KEY }}
        run: |
          helm upgrade \
            --install \
            "${HELM_RELEASE}" \
            "${HELM_CHART_PATH}" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --create-namespace \
            --set "image.repository=${DEPLOY_IMAGE_REPOSITORY}" \
            --set "image.tag=${DEPLOY_IMAGE_TAG}" \
            --set "image.pullPolicy=IfNotPresent" \
            --set-string "django.secretKey=${DEPLOY_DJANGO_SECRET}" \
            --set-string "django.debug=False" \
            --set-string "django.allowedHosts=*" \
            --wait \
            --timeout 10m \
            --atomic

      - name: Verify deployment rollout
        run: |
          kubectl rollout status \
            "deployment/${HELM_RELEASE}-banking-app" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --timeout=600s

      - name: Display Kubernetes resources
        run: |
          echo "===== Nodes ====="
          kubectl get nodes -o wide

          echo "===== Application Resources ====="
          kubectl get all \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide

          echo "===== Ingress ====="
          kubectl get ingress \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide || true

      - name: Show diagnostic information after failure
        if: failure()
        run: |
          echo "===== Pods ====="
          kubectl get pods \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide || true

          echo "===== Deployment ====="
          kubectl describe deployment \
            "${HELM_RELEASE}-banking-app" \
            --namespace "${KUBERNETES_NAMESPACE}" || true

          echo "===== Services ====="
          kubectl get services \
            --namespace "${KUBERNETES_NAMESPACE}" \
            -o wide || true

          echo "===== Events ====="
          kubectl get events \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --sort-by='.metadata.creationTimestamp' || true

          echo "===== Application Logs ====="
          kubectl logs \
            "deployment/${HELM_RELEASE}-banking-app" \
            --namespace "${KUBERNETES_NAMESPACE}" \
            --tail=200 || true