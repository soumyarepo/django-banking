<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>SecureBank</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f6fb;
            color: #1f2937;
        }

        header {
            background: #0f3d63;
            color: white;
            padding: 18px 7%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h2 {
            margin: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 22px;
            font-weight: bold;
        }

        main {
            width: 86%;
            max-width: 1200px;
            margin: 30px auto;
        }

        .hero {
            background: linear-gradient(
                135deg,
                #0f3d63,
                #1677a8
            );
            color: white;
            padding: 35px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .hero h1 {
            margin-top: 0;
        }

        .grid {
            display: grid;
            grid-template-columns:
                repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 22px;
            box-shadow:
                0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .balance {
            color: #067647;
            font-size: 25px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th,
        td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #edf4fa;
        }

        .button {
            display: inline-block;
            background: #0f6c9e;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .button:hover {
            background: #094e75;
        }

        .form-card {
            max-width: 600px;
            margin: auto;
        }

        .form-card input,
        .form-card select,
        .form-card textarea {
            width: 100%;
            padding: 11px;
            margin-top: 7px;
            margin-bottom: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
        }

        .message {
            padding: 13px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .success {
            background: #d1fae5;
            color: #065f46;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
        }

        footer {
            text-align: center;
            padding: 25px;
            color: #64748b;
        }
    </style>
</head>

<body>

<header>
    <h2>SecureBank</h2>

    <nav>
        <a href="{% url 'dashboard' %}">
            Dashboard
        </a>

        <a href="{% url 'transfer' %}">
            Transfer Money
        </a>

        <a href="/admin/">
            Admin
        </a>
    </nav>
</header>

<main>
    {% for message in messages %}
        <div class="message {{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}

    {% block content %}
    {% endblock %}
</main>

<footer>
    SecureBank Digital Banking Platform
</footer>

</body>
</html>
